<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Gradien untuk Topi Wisuda (Efek 3D) -->
    <linearGradient id="capTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>
    <linearGradient id="capBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>
    
    <!-- Gradien untuk efek cahaya sinyal -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#0891B2" />
    </radialGradient>

    <!-- Filter untuk shadow halus -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- IKON: TOPI WISUDA DIGITAL -->
  <g filter="url(#shadow)" transform="translate(10, 8)">
    <!-- Bagian Bawah Topi (Tabung) -->
    <path d="M25 42 L55 42 L65 56 L15 56 Z" fill="url(#capBase)" />
    
    <!-- Bidang Datar Atas (Bayangan) -->
    <path d="M40 18 L65 32 L40 46 L15 32 Z" fill="#1E3A8A" />
    
    <!-- Bidang Datar Atas (Permukaan Utama) -->
    <path d="M40 14 L65 28 L40 42 L15 28 Z" fill="url(#capTop)" />
    
    <!-- Tali Topi -->
    <path d="M65 28 L68 48" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none" />
    
    <!-- Node Digital (Titik Tali) -->
    <circle cx="68" cy="48" r="4.5" fill="url(#nodeGlow)" />
    
    <!-- Gelombang Sinyal "e-" (Electronic) -->
    <path d="M84 48 Q88.5 41 84 34" stroke="#06B6D4" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <path d="M90 51 Q96 41 90 31" stroke="#06B6D4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6" />
    <path d="M96 54 Q103 41 96 28" stroke="#06B6D4" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3" />
    
    <!-- Kancing Topi -->
    <circle cx="40" cy="36" r="2.5" fill="#F59E0B" />
  </g>

  <!-- TEKS: e-SIAKAD -->
  <g transform="translate(120, 25)">
    <!-- Huruf "e-" -->
    <text x="0" y="32" 
          font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
          font-size="36" 
          font-weight="800" 
          fill="#0891B2" 
          letter-spacing="-1">
      e-
    </text>
    
    <!-- Huruf "SIAKAD" -->
    <text x="38" y="32" 
          font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
          font-size="36" 
          font-weight="700" 
          fill="#0a7772" 
          letter-spacing="1.5">
      SIAKAD
    </text>
    
    <!-- Tagline Bawah -->
    <text x="0" y="50" 
          font-family="'Segoe UI', system-ui, -apple-system, sans-serif" 
          font-size="10" 
          font-weight="500" 
          fill="#0a7772"
          letter-spacing="3">
      SISTEM INFORMASI AKADEMIK
    </text>
  </g>
</svg>